<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="css/header.css" rel="stylesheet">
  <link href="css/shared.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
  <title>Moves — Pokédex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--text-primary);min-height:100vh}

.page-wrap{max-width:1400px;margin:0 auto;padding:36px 32px 80px}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px}
.page-title{font-family:'Exo 2',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-1px}
.page-title span{color:var(--accent)}

/* ── Controls ── */
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px;align-items:center}
.search-box-moves{
  position:relative;flex:1;min-width:200px;max-width:360px;
}
.search-box-moves svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#555;pointer-events:none}
.search-box-moves input{
  width:100%;height:42px;padding:0 16px 0 42px;
  background:var(--bg-inner);border:1px solid var(--border);border-radius:8px;
  color:var(--text-primary);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;
}
.search-box-moves input:focus{border-color:var(--accent-border)}
.filter-row{display:flex;flex-wrap:wrap;gap:6px}
.filter-btn{
  height:34px;padding:0 12px;border-radius:20px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-muted);font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.filter-btn:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.filter-btn.active{background:var(--accent-faint);color:var(--accent);border-color:var(--accent-border)}

/* ── Stats bar ── */
.moves-stats-bar{
  display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;
}
.stat-pill{
  padding:6px 14px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:8px;font-size:12px;font-weight:600;color:var(--text-muted);
}
.stat-pill strong{color:var(--text-primary);margin-left:4px}

/* ── Grid ── */
.moves-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}
.move-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  cursor:pointer;
  transition:transform .15s,background .15s,border-color .15s;
  display:flex;flex-direction:column;gap:10px;
  position:relative;overflow:hidden;
}
.move-card::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:70px;height:70px;border-radius:50%;
  background:var(--mc,#888);opacity:.06;pointer-events:none;
}
.move-card:hover{
  transform:translateY(-3px);background:var(--bg-inner);border-color:var(--border-mid);
}
.move-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.move-name{font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700;text-transform:capitalize;color:var(--text-primary)}
.move-type-badge{
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
  padding:3px 9px;border-radius:20px;color:#fff;flex-shrink:0;
  text-shadow:0 1px 2px rgba(0,0,0,.4);
}
.move-meta{display:flex;gap:12px;flex-wrap:wrap}
.move-meta-item{display:flex;flex-direction:column;gap:1px}
.move-meta-label{font-size:10px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase}
.move-meta-value{font-size:13px;font-weight:700;color:var(--text-primary)}
.move-class-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:2px 8px;border-radius:4px;
}
.move-class-physical{background:rgba(245,172,120,.15);color:#f5ac78;border:1px solid rgba(245,172,120,.3)}
.move-class-special{background:rgba(157,183,245,.15);color:#9db7f5;border:1px solid rgba(157,183,245,.3)}
.move-class-status{background:rgba(167,219,141,.15);color:#a7db8d;border:1px solid rgba(167,219,141,.3)}

.move-pp-bar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.move-pp-fill{height:100%;border-radius:99px;background:var(--accent);opacity:.7}

.move-detail-btn{
  margin-top:auto;height:32px;border-radius:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--text-muted);font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;
}
.move-detail-btn:hover{
  background:var(--accent-faint);border-color:var(--accent-border);color:var(--accent);
}

/* Loading */
.page-loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:80px;
  color:var(--text-muted);font-size:14px;grid-column:1/-1;
}

/* ── Modal move detail ── */
.modal-move-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
.modal-move-icon{
  width:56px;height:56px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.modal-move-title{font-family:'Exo 2',sans-serif;font-size:1.6rem;font-weight:900;text-transform:capitalize;margin-bottom:6px}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
.modal-stat-box{
  background:var(--bg-inner);border:1px solid var(--border);
  border-radius:8px;padding:12px;text-align:center;
}
.modal-stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.modal-stat-value{font-size:20px;font-weight:800;color:var(--text-primary)}
.modal-desc{font-size:14px;color:var(--text-muted);line-height:1.7;padding:16px;background:var(--bg-inner);border-radius:8px;border:1px solid var(--border)}
.modal-learnt-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px}
.learnt-by-grid{display:flex;flex-wrap:wrap;gap:8px;max-height:180px;overflow-y:auto}
.learnt-by-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:6px;
  background:var(--bg-inner);border:1px solid var(--border);
  font-size:12px;font-weight:500;color:var(--text-muted);
  text-decoration:none;cursor:pointer;transition:border-color .15s,color .15s;
}
.learnt-by-chip:hover{border-color:var(--accent-border);color:var(--accent)}
.learnt-by-chip img{width:28px;height:28px;image-rendering:pixelated}

@media(max-width:600px){
  .page-wrap{padding:24px 16px 60px}
  .modal-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

</header>

<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">Move<span>dex</span></h1>
    <div class="moves-stats-bar" id="moves-stats-bar">
      <div class="stat-pill">Carregando...</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div id="load-progress-wrap" style="display:none;flex-direction:column;gap:6px;margin-bottom:16px">
    <div style="font-size:12px;color:var(--text-muted)" id="load-progress-label">Carregando moves...</div>
    <div style="height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden">
      <div id="load-progress-fill" style="height:100%;background:var(--accent);border-radius:99px;width:0%;transition:width .3s"></div>
    </div>
  </div>

  <div class="controls">
    <div class="search-box-moves">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="move-search" placeholder="Buscar move por nome..." oninput="applyFilters()" autocomplete="off"/>
    </div>
    <div class="filter-row" id="special-filters">
      <button class="filter-btn active" onclick="setSpecialFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setSpecialFilter('normal',this)">Normais</button>
      <button class="filter-btn" onclick="setSpecialFilter('zmove',this)" style="color:var(--accent)">⚡ Z-Moves</button>
    </div>
    <div class="filter-row" id="type-filters"></div>
    <div class="filter-row" id="class-filters">
      <button class="filter-btn active" onclick="setClassFilter('all',this)">Classe: Todos</button>
      <button class="filter-btn" onclick="setClassFilter('physical',this)" style="color:#f5ac78">Físico</button>
      <button class="filter-btn" onclick="setClassFilter('special',this)" style="color:#9db7f5">Especial</button>
      <button class="filter-btn" onclick="setClassFilter('status',this)" style="color:#a7db8d">Status</button>
    </div>
  </div>

  <div class="moves-grid" id="moves-grid">
    <div class="page-loading"><div class="pokeball-loader"></div><p>Carregando moves...</p></div>
  </div>
</div>

<!-- Detail Modal -->
<div id="move-modal" style="display:none"></div>

<script src="js/shared.js"></script>
<script>
/* ── Constants ── */
const MOVE_TYPE_EMOJIS = {fire:'🔥',water:'💧',grass:'🌿',electric:'⚡',ice:'❄️',fighting:'👊',poison:'☠️',ground:'🌍',flying:'🌬️',psychic:'🔮',bug:'🐛',rock:'🪨',ghost:'👻',dragon:'🐉',dark:'🌑',steel:'⚙️',fairy:'✨',normal:'⭐'}
const CLASS_PT = {physical:'Físico',special:'Especial',status:'Status'}

/* Z-Move list (hardcoded — not in PokéAPI moves endpoint) */
const Z_MOVE_LIST = [
  {name:'breakneck-blitz',type:'normal',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'all-out-pummeling',type:'fighting',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'supersonic-skystrike',type:'flying',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'acid-downpour',type:'poison',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'tectonic-rage',type:'ground',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'continental-crush',type:'rock',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'savage-spin-out',type:'bug',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'never-ending-nightmare',type:'ghost',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'corkscrew-crash',type:'steel',class:'physical',power:null,pp:1,accuracy:null,isZ:true},
  {name:'inferno-overdrive',type:'fire',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'hydro-vortex',type:'water',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'bloom-doom',type:'grass',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'gigavolt-havoc',type:'electric',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'shattered-psyche',type:'psychic',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'subzero-slammer',type:'ice',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'devastating-drake',type:'dragon',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'black-hole-eclipse',type:'dark',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  {name:'twinkle-tackle',type:'fairy',class:'special',power:null,pp:1,accuracy:null,isZ:true},
  // Signature Z-Moves
  {name:'catastropika',type:'electric',class:'physical',power:210,pp:1,accuracy:null,isZ:true},
  {name:'10-000-000-volt-thunderbolt',type:'electric',class:'special',power:195,pp:1,accuracy:null,isZ:true},
  {name:'stoked-sparksurfer',type:'electric',class:'special',power:175,pp:1,accuracy:null,isZ:true},
  {name:'pulverizing-pancake',type:'normal',class:'physical',power:210,pp:1,accuracy:null,isZ:true},
  {name:'extreme-evoboost',type:'normal',class:'status',power:null,pp:1,accuracy:null,isZ:true},
  {name:'genesis-supernova',type:'psychic',class:'special',power:185,pp:1,accuracy:null,isZ:true},
  {name:'sinister-arrow-raid',type:'ghost',class:'physical',power:180,pp:1,accuracy:null,isZ:true},
  {name:'malicious-moonsault',type:'dark',class:'physical',power:180,pp:1,accuracy:null,isZ:true},
  {name:'oceanic-operetta',type:'water',class:'special',power:195,pp:1,accuracy:null,isZ:true},
  {name:'soul-stealing-7-star-strike',type:'ghost',class:'physical',power:195,pp:1,accuracy:null,isZ:true},
  {name:'splintered-stormshards',type:'rock',class:'physical',power:190,pp:1,accuracy:null,isZ:true},
  {name:'lets-snuggle-forever',type:'fairy',class:'physical',power:190,pp:1,accuracy:null,isZ:true},
  {name:'clangorous-soulblaze',type:'dragon',class:'special',power:185,pp:1,accuracy:null,isZ:true},
  {name:'guardian-of-alola',type:'fairy',class:'special',power:null,pp:1,accuracy:null,isZ:true},
]

/* ── State ── */
let allMoves = []       // fully loaded
let moveUrls = []       // list from API
let activeType = 'all'
let activeClass = 'all'
let activeSpecial = 'all'  // 'all' | 'zmove' | 'normal'
let moveCache = {}
let loadedCount = 0
let isLoading = false
const CHUNK = 50

/* ── Load list then fetch in chunks ── */
async function loadMoves() {
  setLoadingBar(true, 0)
  const list = await apiFetch('https://pokeapi.co/api/v2/move?limit=950')
  moveUrls = list.results

  // Inject Z-moves into the list so they appear in filters
  Z_MOVE_LIST.forEach(z => {
    allMoves.push({
      name: z.name,
      type: { name: z.type },
      damage_class: { name: z.class },
      power: z.power,
      accuracy: z.accuracy,
      pp: z.pp,
      priority: 0,
      isZ: true,
      flavor_text_entries: [],
      effect_entries: [],
      learned_by_pokemon: [],
      meta: null,
      generation: { name: 'generation-vii' },
      target: { name: 'selected-pokemon' }
    })
  })

  buildTypeFilters()
  applyFilters()
  updateStatsBar()
  await fetchNextChunk()
}

async function fetchNextChunk() {
  if (isLoading || loadedCount >= moveUrls.length) {
    setLoadingBar(false, 100)
    return
  }
  isLoading = true
  const slice = moveUrls.slice(loadedCount, loadedCount + CHUNK)
  const results = await Promise.allSettled(slice.map(m => apiFetch(m.url)))

  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value) {
      allMoves.push(r.value)
    }
  })
  loadedCount += slice.length

  const pct = Math.round((loadedCount / moveUrls.length) * 100)
  setLoadingBar(true, pct, loadedCount, moveUrls.length)

  buildTypeFilters()
  applyFilters()
  updateStatsBar()
  isLoading = false

  // Schedule next chunk without blocking UI
  if (loadedCount < moveUrls.length) {
    setTimeout(fetchNextChunk, 50)
  } else {
    setLoadingBar(false, 100)
  }
}

function setLoadingBar(visible, pct, loaded, total) {
  const bar = document.getElementById('load-progress-wrap')
  const fill = document.getElementById('load-progress-fill')
  const label = document.getElementById('load-progress-label')
  if (!bar) return
  bar.style.display = visible ? 'flex' : 'none'
  fill.style.width = pct + '%'
  if (label && loaded !== undefined) {
    label.textContent = `Carregando moves... ${loaded}/${total} (${pct}%)`
  }
}

/* ── Filters ── */
function buildTypeFilters() {
  const types = [...new Set(allMoves.map(m=>m.type?.name).filter(Boolean))].sort()
  const container = document.getElementById('type-filters')
  const active = container.querySelector('.active')?.dataset?.type || 'all'
  container.innerHTML = `<button class="filter-btn ${active==='all'?'active':''}" data-type="all" onclick="setTypeFilter('all',this)">Todos</button>` +
    types.map(t => `<button class="filter-btn ${active===t?'active':''}" data-type="${t}" onclick="setTypeFilter('${t}',this)" style="color:${TYPE_COLORS[t]||'#aaa'}">${cap(t)}</button>`).join('')
}

function setTypeFilter(type, btn) {
  activeType = type
  document.querySelectorAll('#type-filters .filter-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  applyFilters()
}
function setClassFilter(cls, btn) {
  activeClass = cls
  document.querySelectorAll('#class-filters .filter-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  applyFilters()
}
function setSpecialFilter(val, btn) {
  activeSpecial = val
  document.querySelectorAll('#special-filters .filter-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  applyFilters()
}

function applyFilters() {
  const q = document.getElementById('move-search').value.toLowerCase().trim()
  let filtered = allMoves
  if (activeType !== 'all')    filtered = filtered.filter(m=>m.type?.name===activeType)
  if (activeClass !== 'all')   filtered = filtered.filter(m=>m.damage_class?.name===activeClass)
  if (activeSpecial === 'zmove')  filtered = filtered.filter(m=>m.isZ)
  if (activeSpecial === 'normal') filtered = filtered.filter(m=>!m.isZ)
  if (q) filtered = filtered.filter(m=>m.name.includes(q)||slug(m.name).includes(q))
  renderMoves(filtered)
  updateStatsBar(filtered)
}

function updateStatsBar(moves) {
  const set = moves || allMoves
  document.getElementById('moves-stats-bar').innerHTML = `
    <div class="stat-pill">Total <strong>${set.length}</strong></div>
    <div class="stat-pill">Físico <strong>${set.filter(m=>m.damage_class?.name==='physical').length}</strong></div>
    <div class="stat-pill">Especial <strong>${set.filter(m=>m.damage_class?.name==='special').length}</strong></div>
    <div class="stat-pill">Status <strong>${set.filter(m=>m.damage_class?.name==='status').length}</strong></div>
    <div class="stat-pill" style="color:#e8ff47">Z-Moves <strong>${set.filter(m=>m.isZ).length}</strong></div>
  `
}

/* ── Render cards ── */
function makeMoveCard(m) {
  const type = m.type?.name || 'normal'
  const cls  = m.damage_class?.name || 'status'
  const typeColor = TYPE_COLORS[type] || '#888'
  const typeBg    = TYPE_BG[type] || '#888'
  const ppPct = m.pp ? Math.min(100, m.pp/40*100) : 0
  const zBadge = m.isZ ? `<span style="font-size:9px;font-weight:800;text-transform:uppercase;padding:2px 6px;border-radius:20px;background:rgba(232,255,71,.15);color:var(--accent);border:1px solid rgba(232,255,71,.3);letter-spacing:.5px">Z</span>` : ''
  return `
  <div class="move-card" style="--mc:${typeColor}" onclick="openMoveDetail('${m.name}')">
    <div class="move-card-top">
      <span class="move-name">${slug(m.name)}</span>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">${zBadge}<span class="move-type-badge" style="background:${typeBg}">${type}</span></div>
    </div>
    <div class="move-meta">
      <div class="move-meta-item"><span class="move-meta-label">Poder</span><span class="move-meta-value">${m.power||'—'}</span></div>
      <div class="move-meta-item"><span class="move-meta-label">Precisão</span><span class="move-meta-value">${m.accuracy?m.accuracy+'%':'—'}</span></div>
      <div class="move-meta-item"><span class="move-meta-label">PP</span><span class="move-meta-value">${m.pp||'—'}</span></div>
      <span class="move-class-badge move-class-${cls}">${CLASS_PT[cls]||cls}</span>
    </div>
    <div class="move-pp-bar"><div class="move-pp-fill" style="width:${ppPct}%"></div></div>
    <button class="move-detail-btn" onclick="event.stopPropagation();openMoveDetail('${m.name}')">Ver detalhes →</button>
  </div>`
}

function renderMoves(moves) {
  const grid = document.getElementById('moves-grid')
  if (!moves.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim)">Nenhum move encontrado.</div>`
    return
  }
  grid.innerHTML = moves.map(makeMoveCard).join('')
}

/* ── Move detail modal ── */
async function openMoveDetail(name) {
  const modal = document.getElementById('move-modal')
  modal.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px'
  modal.innerHTML = `<div style="max-width:600px;width:100%;background:var(--bg-card);border-radius:20px;border:1px solid rgba(255,255,255,.13);padding:32px;position:relative;max-height:85vh;overflow-y:auto">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px"><div class="pokeball-loader"></div></div>
    <button class="modal-close" onclick="closeModal()">✕</button></div>`

  // Z-moves may not be in the API — build from local data
  let move = moveCache[name]
  if (!move) {
    const zLocal = Z_MOVE_LIST.find(z=>z.name===name)
    if (zLocal) {
      move = {
        name: zLocal.name, type:{name:zLocal.type}, damage_class:{name:zLocal.class},
        power:zLocal.power, accuracy:zLocal.accuracy, pp:zLocal.pp, priority:0,
        isZ:true, flavor_text_entries:[], effect_entries:[], learned_by_pokemon:[],
        meta:null, generation:{name:'generation-vii'}, target:{name:'selected-pokemon'}
      }
    } else {
      try { move = await apiFetch(`https://pokeapi.co/api/v2/move/${name}`) } catch(e) {}
    }
    moveCache[name] = move
  }
  if (!move) return

  const type    = move.type?.name || 'normal'
  const cls     = move.damage_class?.name || 'status'
  const typeBg  = TYPE_BG[type] || '#888'
  const typeColor = TYPE_COLORS[type] || '#888'
  const desc    = move.flavor_text_entries?.find(e=>e.language.name==='en')?.flavor_text?.replace(/\n|\f/g,' ') || ''
  const effect  = move.effect_entries?.find(e=>e.language.name==='en')?.short_effect?.replace(/\$effect_chance/g,move.effect_chance||'') || ''
  const learners = (move.learned_by_pokemon||[]).slice(0,36)
  const learnersHTML = learners.map(p=>{
    const id=p.url.split('/').filter(Boolean).pop()
    return `<a class="learnt-by-chip" href="pokemon.html?id=${id}">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" alt="${p.name}"/>${cap(p.name)}</a>`
  }).join('')
  const zBanner = move.isZ ? `<div style="margin-bottom:12px;padding:8px 14px;background:rgba(232,255,71,.08);border:1px solid rgba(232,255,71,.25);border-radius:8px;font-size:12px;color:var(--accent);font-weight:600">⚡ Z-Move — versão definitiva do tipo ${cap(type)}</div>` : ''

  modal.querySelector('div').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    ${zBanner}
    <div class="modal-move-header">
      <div class="modal-move-icon" style="background:${typeBg}22;width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${MOVE_TYPE_EMOJIS[type]||'⭐'}</div>
      <div>
        <div class="modal-move-title">${slug(move.name)}</div>
        <div class="modal-badges" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">
          <span class="type type-${type}">${type}</span>
          <span class="move-class-badge move-class-${cls}">${CLASS_PT[cls]||cls}</span>
          ${move.meta?.category?.name?`<span style="font-size:11px;color:var(--text-muted);padding:3px 8px;background:var(--bg-inner);border-radius:6px;border:1px solid var(--border)">${cap(slug(move.meta.category.name))}</span>`:''}
        </div>
      </div>
    </div>
    <div class="modal-stats">
      <div class="modal-stat-box"><div class="modal-stat-label">Poder</div><div class="modal-stat-value">${move.power||'—'}</div></div>
      <div class="modal-stat-box"><div class="modal-stat-label">Precisão</div><div class="modal-stat-value">${move.accuracy?move.accuracy+'%':'—'}</div></div>
      <div class="modal-stat-box"><div class="modal-stat-label">PP</div><div class="modal-stat-value">${move.pp||'—'}</div></div>
      <div class="modal-stat-box"><div class="modal-stat-label">Prioridade</div><div class="modal-stat-value">${move.priority??'—'}</div></div>
      <div class="modal-stat-box"><div class="modal-stat-label">Alvo</div><div class="modal-stat-value" style="font-size:13px">${cap(slug(move.target?.name||'—'))}</div></div>
      <div class="modal-stat-box"><div class="modal-stat-label">Geração</div><div class="modal-stat-value" style="font-size:13px">${cap(slug(move.generation?.name||'—')).replace('Generation-','Gen ')}</div></div>
    </div>
    ${desc?`<div class="modal-desc">${desc}</div>`:''}
    ${effect&&effect!==desc?`<div class="modal-desc" style="margin-top:8px;border-color:${typeColor}33">${effect}</div>`:''}
    ${learners.length?`<p class="modal-learnt-title">Aprendido por (${learners.length} de ${move.learned_by_pokemon?.length||0})</p><div class="learnt-by-grid">${learnersHTML}</div>`:''}
  `
}

function closeModal() { document.getElementById('move-modal').style.display='none' }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal() })

loadMoves()
</script>
</body>
</html>
