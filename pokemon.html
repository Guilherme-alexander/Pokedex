</header>

<div class="container">
  <a href="index.html" class="back">← voltar</a>
  <div class="pokemon-card" data-js="pokemon">
    <div class="loading-screen">
      <div class="pokeball-loader"></div>
      <p>carregando...</p>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   LOOKUP TABLES
═══════════════════════════════════════════ */
const TYPE_COLORS = {
  fire:'#fd7d24',water:'#1E90FF',grass:'#9bcc50',bug:'#7a9e4a',
  flying:'#aaaaaa',poison:'#b97fc9',electric:'#ffbd00',ground:'#cdb25a',
  fairy:'#e27a9d',psychic:'#dc439d',fighting:'#ea3b3b',rock:'#a38c21',
  ghost:'#9b82d3',ice:'#51c4e7',dragon:'#9988ff',dark:'#777777',
  steel:'#aaaaaa',normal:'#aaaaaa'
}
const STAT_COLORS = {
  hp:'#ff5959',attack:'#f5ac78',defense:'#fae078',
  'special-attack':'#9db7f5','special-defense':'#a7db8d',speed:'#fa92b2'
}
const STAT_LABELS = {
  hp:'HP',attack:'Ataque',defense:'Defesa',
  'special-attack':'Atq. Esp.','special-defense':'Def. Esp.',speed:'Velocidade'
}
const TYPE_CHART = {
  normal:{fighting:2,ghost:0},
  fire:{water:2,ground:2,rock:2,fire:.5,grass:.5,ice:.5,bug:.5,steel:.5,fairy:.5},
  water:{electric:2,grass:2,fire:.5,water:.5,ice:.5,steel:.5},
  electric:{ground:2,electric:.5,flying:.5,steel:.5},
  grass:{fire:2,ice:2,poison:2,flying:2,bug:2,water:.5,electric:.5,grass:.5,ground:.5},
  ice:{fire:2,fighting:2,rock:2,steel:2,ice:.5},
  fighting:{flying:2,psychic:2,fairy:2,bug:.5,rock:.5,dark:.5},
  poison:{ground:2,psychic:2,fighting:.5,poison:.5,bug:.5,grass:.5,fairy:.5},
  ground:{water:2,grass:2,ice:2,electric:0,poison:.5,rock:.5},
  flying:{electric:2,ice:2,rock:2,fighting:.5,bug:.5,grass:.5,ground:0},
  psychic:{bug:2,ghost:2,dark:2,fighting:.5,psychic:.5},
  bug:{fire:2,flying:2,rock:2,fighting:.5,ground:.5,grass:.5},
  rock:{water:2,grass:2,fighting:2,ground:2,steel:2,normal:.5,fire:.5,poison:.5,flying:.5},
  ghost:{ghost:2,dark:2,normal:0,fighting:0,poison:.5,bug:.5},
  dragon:{ice:2,dragon:2,fairy:2,fire:.5,water:.5,electric:.5,grass:.5},
  dark:{fighting:2,bug:2,fairy:2,ghost:.5,dark:.5,psychic:0},
  steel:{fire:2,fighting:2,ground:2,normal:.5,grass:.5,ice:.5,flying:.5,psychic:.5,bug:.5,rock:.5,dragon:.5,steel:.5,poison:0,fairy:.5},
  fairy:{poison:2,steel:2,fighting:.5,bug:.5,dark:.5,dragon:0}
}
const ALL_TYPES = ['normal','fire','water','electric','grass','ice','fighting','poison','ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy']
const TYPE_ABBR = {normal:'NOR',fire:'FIR',water:'WAT',electric:'ELE',grass:'GRA',ice:'ICE',fighting:'FIG',poison:'POI',ground:'GRO',flying:'FLY',psychic:'PSY',bug:'BUG',rock:'ROC',ghost:'GHO',dragon:'DRA',dark:'DAR',steel:'STE',fairy:'FAI'}
const TYPE_BG = {normal:'#9EA0A5',fire:'#fd7d24',water:'#1E90FF',electric:'#ffbd00',grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',steel:'#B8B8D0',fairy:'#EE99AC'}

/* Z-Moves por tipo */
const Z_MOVES = {
  normal:'Breakneck Blitz',fire:'Inferno Overdrive',water:'Hydro Vortex',
  electric:'Gigavolt Havoc',grass:'Bloom Doom',ice:'Subzero Slammer',
  fighting:'All-Out Pummeling',poison:'Acid Downpour',ground:'Tectonic Rage',
  flying:'Supersonic Skystrike',psychic:'Shattered Psyche',bug:'Savage Spin-Out',
  rock:'Continental Crush',ghost:'Never-Ending Nightmare',dragon:'Devastating Drake',
  dark:'Black Hole Eclipse',steel:'Corkscrew Crash',fairy:'Twinkle Tackle'
}

/* Formas especiais label map */
const FORM_LABEL = {
  'mega':'Mega','mega-x':'Mega X','mega-y':'Mega Y',
  'gmax':'Gigantamax','alola':'Alola','galar':'Galar',
  'hisui':'Hisui','paldea':'Paldea','primal':'Primário',
  'origin':'Origem','sky':'Céu','therian':'Totem',
  'black':'Preto','white':'Branco','pirouette':'Dança',
  'resolute':'Resoluto','ordinary':'Normal',
  'average':'Médio','small':'Pequeno','large':'Grande','super':'Super',
  'school':'Cardume','dusk':'Crepúsculo','dawn':'Aurora','midnight':'Meia-noite',
  'midday':'Meio-dia','eternal':'Eterno','original':'Original',
  'blade':'Lâmina','shield':'Escudo','sunny':'Sol','rainy':'Chuva',
  'snowy':'Neve','male':'Macho','female':'Fêmea',
  'speed':'Velocidade','defense':'Defesa','attack':'Ataque'
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentPokemon = null    // dados do pokémon ativo (pode ser mega, etc)
let basePokemon = null       // pokémon base sempre
let allVarieties = []        // [{name, url, label, isMega, isGmax}]
let allMoves = []
let currentTab = 'level-up'
let abilityCacheMap = {}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const cap = s => s.charAt(0).toUpperCase() + s.slice(1)
const pad = n => String(n).padStart(3,'0')
const slug = s => s.replace(/-/g,' ')

function getPokemonId() {
  return Number(new URLSearchParams(window.location.search).get('id'))
}
async function apiFetch(url) {
  const r = await fetch(url)
  return r.json()
}

function getFormLabel(fullName, baseName) {
  if (fullName === baseName) return 'Normal'
  const suffix = fullName.replace(baseName + '-', '')
  // Try known labels
  for (const [key, val] of Object.entries(FORM_LABEL)) {
    if (suffix === key || suffix.includes(key)) return val
  }
  // Fallback: capitalize the suffix
  return cap(slug(suffix))
}

function isMegaOrSpecial(name, baseName) {
  const s = name.replace(baseName + '-', '')
  return ['mega','mega-x','mega-y','gmax','primal','origin','ultra'].some(k => s.includes(k))
}

/* ═══════════════════════════════════════════
   TYPE DEFENSE CALC
═══════════════════════════════════════════ */
function calcDefenses(types) {
  const eff = {}
  ALL_TYPES.forEach(att => {
    let mult = 1
    types.forEach(def => { mult *= (TYPE_CHART[att]?.[def] ?? 1) })
    eff[att] = mult
  })
  return eff
}

/* ═══════════════════════════════════════════
   EVOLUTION CHAIN
═══════════════════════════════════════════ */
function getEvoBranches(chain) {
  function walk(node, path) {
    const d = node.evolution_details?.[0] || null
    let method = null
    if (d) {
      if (d.trigger?.name === 'level-up' && d.min_level)        method = `Nv. ${d.min_level}`
      else if (d.trigger?.name === 'trade')                      method = d.held_item ? `Troca c/ ${cap(slug(d.held_item.name))}` : 'Troca'
      else if (d.trigger?.name === 'use-item' && d.item)         method = cap(slug(d.item.name))
      else if (d.trigger?.name === 'level-up' && d.min_happiness) method = 'Amizade ♥'
      else if (d.trigger?.name === 'level-up' && d.time_of_day) method = `Nível (${d.time_of_day})`
      else if (d.trigger?.name === 'level-up')                   method = 'Nível up'
      else if (d.trigger?.name)                                   method = cap(slug(d.trigger.name))
    }
    const cur = { name: node.species.name, url: node.species.url, method }
    const newPath = [...path, cur]
    if (!node.evolves_to.length) return [newPath]
    return node.evolves_to.flatMap(child => walk(child, newPath))
  }
  return walk(chain, [])
}

/* ═══════════════════════════════════════════
   RENDER: TYPE BADGES
═══════════════════════════════════════════ */
function renderTypeBadges(types) {
  return types.map(t => `<span class="type type-${t}">${t}</span>`).join('')
}

/* ═══════════════════════════════════════════
   RENDER: STATS BAR
═══════════════════════════════════════════ */
function statBarWidth(v) { return Math.min(100, Math.round((v / 255) * 100)) }

function renderStats(stats) {
  return stats.map(item => {
    const name = item.stat.name
    const val = item.base_stat
    const color = STAT_COLORS[name] || '#888'
    const label = STAT_LABELS[name] || name
    return `
      <li class="stat-row">
        <span class="stat-name">${label}</span>
        <span class="stat-value">${val}</span>
        <div class="stat-bar-bg">
          <div class="stat-bar-fill" style="width:${statBarWidth(val)}%;background:${color}"></div>
        </div>
      </li>`
  }).join('')
}

/* ═══════════════════════════════════════════
   RENDER: DEFENSES TABLE
═══════════════════════════════════════════ */
function renderDefensesHTML(types) {
  const eff = calcDefenses(types)
  const cells = ALL_TYPES.map(att => {
    const mult = eff[att]
    let label = ''
    if (mult===0) label='0'
    else if (mult===.25) label='¼'
    else if (mult===.5) label='½'
    else if (mult===2) label='2'
    else if (mult===4) label='4'
    const cls = mult<1?'def-low':mult>1?'def-high':'def-neutral'
    return `<div class="def-cell">
      <div class="def-type-badge" style="background:${TYPE_BG[att]}">${TYPE_ABBR[att]}</div>
      <div class="def-mult ${cls}">${label}</div>
    </div>`
  }).join('')
  return `<div class="def-grid">${cells}</div>`
}

/* ═══════════════════════════════════════════
   RENDER: MOVES TABS
═══════════════════════════════════════════ */
function renderMovesTab(tab) {
  currentTab = tab
  const filtered = tab==='all' ? allMoves : allMoves.filter(m=>m.method===tab)
  const tabs = [
    {id:'level-up',label:'Level Up'},
    {id:'machine',label:'TM / HM'},
    {id:'egg',label:'Ovo'},
    {id:'tutor',label:'Tutor'},
    {id:'all',label:'Todos'}
  ]
  const tabsHTML = tabs.map(t =>
    `<button class="tab-btn${t.id===tab?' active':''}" onclick="renderMovesTab('${t.id}')">${t.label}</button>`
  ).join('')
  const movesHTML = filtered.length
    ? filtered.map(m=>`<li class="move-pill">${slug(m.name)}</li>`).join('')
    : `<li class="move-empty">Nenhum move nesta categoria.</li>`
  document.querySelector('.moves-section').innerHTML = `
    <p class="section-title">Moves (${filtered.length} de ${allMoves.length})</p>
    <div class="tabs-row">${tabsHTML}</div>
    <ul class="moves-grid">${movesHTML}</ul>`
}

/* ═══════════════════════════════════════════
   RENDER: Z-MOVES
═══════════════════════════════════════════ */
function renderZMoves(types) {
  const zmoves = types.map(t => ({type:t, move:Z_MOVES[t]||null})).filter(z=>z.move)
  if (!zmoves.length) return ''
  const items = zmoves.map(z => `
    <div class="zmove-card">
      <span class="zmove-type-dot" style="background:${TYPE_COLORS[z.type]||'#888'}">${z.type}</span>
      <span class="zmove-name">${z.move}</span>
    </div>`).join('')
  return `<div class="zmoves-section">
    <p class="section-title">Z-Moves</p>
    <div class="zmoves-list">${items}</div>
  </div>`
}

/* ═══════════════════════════════════════════
   RENDER: ABILITIES
═══════════════════════════════════════════ */
async function fetchAbilityDesc(url) {
  if (abilityCacheMap[url]) return abilityCacheMap[url]
  try {
    const data = await apiFetch(url)
    const entry = data.flavor_text_entries?.find(e=>e.language.name==='en')
    const desc = entry ? entry.flavor_text.replace(/\n|\f/g,' ') : ''
    abilityCacheMap[url] = desc
    return desc
  } catch(e) { return '' }
}

async function renderAbilitiesSection(abilities) {
  const section = document.querySelector('.abilities-section')
  if (!section) return
  const items = await Promise.all(abilities.map(async a => {
    const name = a.ability.name
    const isHidden = a.is_hidden
    const desc = await fetchAbilityDesc(a.ability.url)
    return `<div class="ability-card">
      <div class="ability-header">
        <span class="ability-name">${cap(slug(name))}</span>
        ${isHidden?'<span class="ability-hidden">Oculta</span>':''}
      </div>
      ${desc?`<p class="ability-desc">${desc}</p>`:''}
    </div>`
  }))
  section.innerHTML = `
    <p class="section-title">Habilidades</p>
    <div class="abilities-list">${items.join('')}</div>`
}

/* ═══════════════════════════════════════════
   RENDER: FORM SELECTOR (varieties)
═══════════════════════════════════════════ */
function renderFormSelector(varieties, activeIndex) {
  if (varieties.length <= 1) return ''
  const btns = varieties.map((v, i) => `
    <button class="form-btn${i===activeIndex?' active':''}"
      onclick="switchForm(${i})"
      title="${v.label}">
      ${v.isMega || v.isGmax ? `<span class="form-special-dot"></span>` : ''}
      ${v.label}
    </button>`).join('')
  return `<div class="form-selector">${btns}</div>`
}

/* ═══════════════════════════════════════════
   RENDER: MEGA CARDS in Evolution section
═══════════════════════════════════════════ */
function renderMegaCards(varieties, activeVarietyIndex) {
  const specials = varieties.filter((v,i) => i > 0 && (v.isMega || v.isGmax))
  if (!specials.length) return ''

  const cards = specials.map((v, idx) => {
    const realIdx = varieties.indexOf(v)
    const sprite = v.pokemonData?.sprites?.front_default || ''
    const types = v.pokemonData?.types?.map(t=>t.type.name) || []
    const artworkUrl = v.pokemonData?.sprites?.other?.['official-artwork']?.front_default || sprite
    const isActive = realIdx === activeVarietyIndex
    const typeBadges = types.map(t=>`<span class="evo-type-dot" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('')
    return `
      <div class="mega-card${isActive?' mega-active':''}" onclick="switchForm(${realIdx})" title="Ver ${v.label}">
        <div class="mega-card-img-wrap">
          <img src="${artworkUrl}" alt="${v.name}" class="mega-card-img"/>
          ${v.isMega?'<span class="mega-badge">MEGA</span>':''}
          ${v.isGmax?'<span class="mega-badge gmax-badge">GMAX</span>':''}
        </div>
        <span class="mega-card-label">${v.label}</span>
        <div class="mega-card-types">${typeBadges}</div>
      </div>`
  }).join('')

  return `<div class="mega-cards-row">${cards}</div>`
}

/* ═══════════════════════════════════════════
   RENDER: EVO CHAIN
═══════════════════════════════════════════ */
let spriteMapGlobal = {}

async function renderEvolutions(speciesUrl, activeVarietyIndex) {
  const section = document.querySelector('.evo-section')
  if (!section) return
  try {
    const species = await apiFetch(speciesUrl)
    const chainData = await apiFetch(species.evolution_chain.url)
    const branches = getEvoBranches(chainData.chain)
    const uniqueNames = [...new Set(branches.flat().map(s=>s.name))]
    await Promise.all(uniqueNames.map(async name => {
      if (spriteMapGlobal[name]) return
      try {
        const data = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${name}`)
        spriteMapGlobal[name] = { sprite: data.sprites.front_default, id: data.id, types: data.types.map(t=>t.type.name) }
      } catch(e) { spriteMapGlobal[name] = { sprite:null, id:null, types:[] } }
    }))

    const branchesHTML = branches.map(branch => {
      const stepsHTML = branch.map((poke, i) => {
        const info = spriteMapGlobal[poke.name] || {}
        const isActive = info.id === getPokemonId()
        const arrow = i > 0
          ? `<div class="evo-arrow">
               ${poke.method?`<span class="evo-method">${poke.method}</span>`:''}
               <span class="evo-caret">→</span>
             </div>`
          : ''
        const clickAction = info.id ? `location.href='pokemon.html?id=${info.id}'` : ''
        return `${arrow}
          <div class="evo-stage${isActive?' evo-active':''}" onclick="${clickAction}" ${info.id?'style="cursor:pointer"':''}>
            <img src="${info.sprite||''}" alt="${poke.name}" class="evo-img"/>
            <span class="evo-num">#${info.id?pad(info.id):'???'}</span>
            <span class="evo-name">${cap(poke.name)}</span>
            <div class="evo-types">${(info.types||[]).map(t=>`<span class="evo-type-dot" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`).join('')}</div>
          </div>`
      }).join('')
      return `<div class="evo-branch">${stepsHTML}</div>`
    }).join('<div class="evo-divider"></div>')

    // Mega cards section
    const megaHTML = renderMegaCards(allVarieties, activeVarietyIndex)

    section.innerHTML = `
      <p class="section-title">Cadeia de Evolução</p>
      <div class="evo-container">${branchesHTML}</div>
      ${megaHTML ? `
        <div class="mega-section-header">
          <p class="section-title" style="margin-top:24px">Formas Especiais & Mega Evoluções</p>
          <p class="mega-section-sub">Clique para ver stats, tipos e habilidades</p>
        </div>
        ${megaHTML}` : ''}
    `
  } catch(e) {
    section.innerHTML = `<p class="section-title">Cadeia de Evolução</p><p class="def-subtitle">Não disponível.</p>`
  }
}

/* ═══════════════════════════════════════════
   SWITCH FORM (varieties)
═══════════════════════════════════════════ */
async function switchForm(varietyIndex) {
  const v = allVarieties[varietyIndex]
  if (!v) return

  // Show loading on dynamic sections
  const dynSections = ['form-stats','form-abilities','form-zmoves','form-defenses']
  dynSections.forEach(id => {
    const el = document.getElementById(id)
    if (el) el.innerHTML = '<div class="loading-inline">atualizando...</div>'
  })

  // Update form selector active state
  document.querySelectorAll('.form-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === varietyIndex)
  })

  // Fetch pokemon data for this variety if not cached
  if (!v.pokemonData) {
    try {
      v.pokemonData = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${v.name}`)
    } catch(e) { return }
  }

  const poke = v.pokemonData
  currentPokemon = poke

  const types = poke.types.map(t=>t.type.name)
  const accentColor = TYPE_COLORS[types[0]] || '#888'

  // Update hero image + glow
  const heroImg = document.querySelector('.pokemon-main-img')
  const topSection = document.querySelector('.top')
  if (heroImg) {
    const artwork = poke.sprites.other?.['official-artwork']?.front_default || poke.sprites.front_default
    heroImg.src = artwork
    heroImg.alt = poke.name
    heroImg.style.animation = 'none'
    setTimeout(()=> heroImg.style.animation = '', 10)
  }
  if (topSection) topSection.style.setProperty('--type-accent', accentColor)

  // Update name badge
  const nameEl = document.querySelector('.top-info h1')
  const numEl = document.querySelector('.pokemon-number')
  const typesEl = document.querySelector('.types')
  if (nameEl) nameEl.textContent = cap(slug(poke.name))
  if (numEl) numEl.textContent = `#${pad(poke.id > 10000 ? basePokemon.id : poke.id)}`
  if (typesEl) typesEl.innerHTML = renderTypeBadges(types)

  // Update meta row
  const metaRow = document.querySelector('.meta-row')
  if (metaRow) {
    const h = (poke.height/10).toFixed(1)
    const w = (poke.weight/10).toFixed(1)
    metaRow.querySelector('[data-meta="height"]').textContent = `${h} m`
    metaRow.querySelector('[data-meta="weight"]').textContent = `${w} kg`
    metaRow.querySelector('[data-meta="exp"]').textContent = poke.base_experience ?? '—'
  }

  // Update stats
  const statsEl = document.getElementById('form-stats')
  if (statsEl) statsEl.innerHTML = `<p class="section-title">Base Stats</p><ul>${renderStats(poke.stats)}</ul>`

  // Update z-moves
  const zmovesEl = document.getElementById('form-zmoves')
  if (zmovesEl) zmovesEl.innerHTML = renderZMoves(types).replace('<div class="zmoves-section">','').replace('</div>','') || ''

  // Update defenses
  const defEl = document.getElementById('form-defenses')
  if (defEl) {
    defEl.innerHTML = `
      <p class="section-title">Fraquezas & Resistências</p>
      <p class="def-subtitle">Efetividade contra ${types.join(' / ')}</p>
      ${renderDefensesHTML(types)}`
  }

  // Update mega cards highlight
  const megaCards = document.querySelectorAll('.mega-card')
  megaCards.forEach(card => card.classList.remove('mega-active'))
  // Find card matching variety
  document.querySelectorAll('.mega-card').forEach((card, i) => {
    const specials = allVarieties.filter((vv,ii) => ii > 0 && (vv.isMega || vv.isGmax))
    if (specials[i] && allVarieties.indexOf(specials[i]) === varietyIndex) {
      card.classList.add('mega-active')
    }
  })

  // Update abilities (async)
  const abilitiesEl = document.getElementById('form-abilities')
  if (abilitiesEl) {
    abilitiesEl.innerHTML = `<p class="section-title">Habilidades</p><div class="loading-inline">carregando...</div>`
    const items = await Promise.all(poke.abilities.map(async a => {
      const name = a.ability.name
      const desc = await fetchAbilityDesc(a.ability.url)
      return `<div class="ability-card">
        <div class="ability-header">
          <span class="ability-name">${cap(slug(name))}</span>
          ${a.is_hidden?'<span class="ability-hidden">Oculta</span>':''}
        </div>
        ${desc?`<p class="ability-desc">${desc}</p>`:''}
      </div>`
    }))
    abilitiesEl.innerHTML = `
      <p class="section-title">Habilidades</p>
      <div class="abilities-list">${items.join('')}</div>`
  }
}

/* ═══════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════ */
async function renderPokemon(pokemon, varieties) {
  const box = document.querySelector('[data-js="pokemon"]')
  basePokemon = pokemon
  currentPokemon = pokemon

  const types = pokemon.types.map(t=>t.type.name)
  const primaryType = types[0]
  const accentColor = TYPE_COLORS[primaryType] || '#888'
  box.style.setProperty('--type-accent', accentColor)

  allMoves = pokemon.moves.map(m => ({
    name: m.move.name,
    method: m.version_group_details[0]?.move_learn_method?.name || 'other'
  }))

  const artwork = pokemon.sprites.other?.['official-artwork']?.front_default || pokemon.sprites.front_default
  const heightM = (pokemon.height/10).toFixed(1)
  const weightKg = (pokemon.weight/10).toFixed(1)
  const formSelectorHTML = renderFormSelector(varieties, 0)

  document.title = `${cap(pokemon.name)} — Pokédex`

  box.innerHTML = `
    <div class="top" style="--type-accent:${accentColor}">
      <img src="${artwork}" alt="${pokemon.name}" class="pokemon-main-img"/>
      <div class="top-info">
        <p class="pokemon-number">#${pad(pokemon.id)}</p>
        <h1>${cap(pokemon.name)}</h1>
        <div class="types">${renderTypeBadges(types)}</div>
        <div class="meta-row">
          <div class="meta-item"><span class="meta-label">Altura</span><span class="meta-value" data-meta="height">${heightM} m</span></div>
          <div class="meta-item"><span class="meta-label">Peso</span><span class="meta-value" data-meta="weight">${weightKg} kg</span></div>
          <div class="meta-item"><span class="meta-label">Base Exp</span><span class="meta-value" data-meta="exp">${pokemon.base_experience??'—'}</span></div>
        </div>
        ${formSelectorHTML}
      </div>
    </div>

    <div id="form-stats" class="stats">
      <p class="section-title">Base Stats</p>
      <ul>${renderStats(pokemon.stats)}</ul>
    </div>

    <div id="form-abilities" class="abilities-section">
      <p class="section-title">Habilidades</p>
      <div class="loading-inline">carregando...</div>
    </div>

    <div id="form-zmoves" class="zmoves-section">
      ${renderZMoves(types).replace(/<div class="zmoves-section">/,'').replace(/<\/div>\s*$/,'')}
    </div>

    <div class="moves-section">
      <p class="section-title">Moves</p>
      <div class="loading-inline">carregando...</div>
    </div>

    <div class="evo-section">
      <p class="section-title">Cadeia de Evolução</p>
      <div class="loading-inline">carregando...</div>
    </div>

    <div id="form-defenses" class="defenses-section">
      <p class="section-title">Fraquezas & Resistências</p>
      <p class="def-subtitle">Efetividade contra ${types.join(' / ')}</p>
      ${renderDefensesHTML(types)}
    </div>
  `

  const speciesUrl = `https://pokeapi.co/api/v2/pokemon-species/${pokemon.id}`

  // Load async in parallel
  renderMovesTab('level-up')
  await Promise.all([
    renderAbilitiesSection(pokemon.abilities),
    renderEvolutions(speciesUrl, 0)
  ])
}

/* ═══════════════════════════════════════════
   BOOTSTRAP
═══════════════════════════════════════════ */
async function main() {
  const id = getPokemonId()
  const pokemon = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${id}`)
  basePokemon = pokemon

  // Fetch species for varieties
  let varieties = [{
    name: pokemon.name,
    label: 'Normal',
    isMega: false,
    isGmax: false,
    pokemonData: pokemon
  }]

  try {
    const species = await apiFetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
    if (species.varieties && species.varieties.length > 1) {
      // Fetch all varieties data
      const varData = await Promise.all(
        species.varieties.map(async v => {
          const name = v.pokemon.name
          const suffix = name.replace(pokemon.name + '-','')
          const isMega = name.includes('-mega') || name.includes('mega-')
          const isGmax = name.includes('-gmax')
          const label = getFormLabel(name, pokemon.name)
          let pokemonData = null
          if (v.is_default) {
            pokemonData = pokemon
          } else {
            try {
              pokemonData = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${name}`)
            } catch(e) {}
          }
          return { name, label, isMega, isGmax, pokemonData, isDefault: v.is_default }
        })
      )
      // Sort: default first, then megas, then others
      varieties = varData.sort((a,b) => {
        if (a.isDefault) return -1
        if (b.isDefault) return 1
        if (a.isMega && !b.isMega) return -1
        if (b.isMega && !a.isMega) return 1
        if (a.isGmax && !b.isGmax) return -1
        return a.name.localeCompare(b.name)
      })
    }
  } catch(e) {}

  allVarieties = varieties
  await renderPokemon(pokemon, varieties)
}

main()
</script>
