<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="css/style.css" rel="stylesheet" type="text/css">
  <title>Pokédex</title>
</head>
<body>
  <div class="content">
    <h1 class="page-title">Poké<span>dex</span></h1>
    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Buscar por nome ou #número..."
          oninput="handleSearch(this.value)"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Limpar">✕</button>
      </div>
      <div class="search-status" id="search-status"></div>
    </div>
    <nav>
      <button style="background:#fd7d24" class="btn" onclick="filterType('fire')">Fire</button>
      <button style="background:#1E90FF" class="btn" onclick="filterType('water')">Water</button>
      <button style="background:#78a84a" class="btn" onclick="filterType('grass')">Grass</button>
      <button style="background:#526a36" class="btn" onclick="filterType('bug')">Bug</button>
      <button style="background:#999"    class="btn" onclick="filterType('flying')">Flying</button>
      <button style="background:#b97fc9" class="btn" onclick="filterType('poison')">Poison</button>
      <button style="background:#ffbd00" class="btn" onclick="filterType('electric')">Electric</button>
      <button style="background:#cdb25a" class="btn" onclick="filterType('ground')">Ground</button>
      <button style="background:#e27a9d" class="btn" onclick="filterType('fairy')">Fairy</button>
      <button style="background:#dc439d" class="btn" onclick="filterType('psychic')">Psychic</button>
      <button style="background:#ea3b3b" class="btn" onclick="filterType('fighting')">Fighting</button>
      <button style="background:#a38c21" class="btn" onclick="filterType('rock')">Rock</button>
      <button style="background:#7b62a3" class="btn" onclick="filterType('ghost')">Ghost</button>
      <button style="background:#51c4e7" class="btn" onclick="filterType('ice')">Ice</button>
      <button style="background:#7766ee" class="btn" onclick="filterType('dragon')">Dragon</button>
      <button style="background:#444"    class="btn" onclick="filterType('dark')">Dark</button>
      <button style="background:#888"    class="btn" onclick="filterType('steel')">Steel</button>
      <button style="background:#888"    class="btn" onclick="filterType('normal')">Normal</button>
      <button style="background:#e8ff47;color:#111" class="btn" onclick="filterType('')">Todos</button>
    </nav>
  </div>

  <div class="container">
    <ul data-js="pokedex" class="pokedex"></ul>
  </div>

  <script src="js/requests.js"></script>
</body>
</html>
